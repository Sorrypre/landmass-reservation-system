              }

                    <option>0800H</option>

                    <option>1130H</option>

                    <option>1230H</option>

                    <option>1400H</option>
                    <option>1430H</option>
                    <option>1530H</option>
                    <option>1600H</option>
                    <option>1630H</option>
                    <option>1700H</option>
                </select>
                <select id="reserved-room" name="reserved-room">
                    <option selected hidden disabled>Pick Room</option>
                    <option>G203</option>
                    <option>G204</option>
                    <option>G205</option>
                    <option>G206</option>
                    <option>G207</option>

                    <div class="room-container" id="g203">
                        <div>G203</div>

                    </div>
                    <div class="room-container" id="g204">

                        <div>G207</div>

            <div id="seat-selection">

                        <div class="seat" data-pc="12"></div>
                    </div>

                    <div class="row" id="row-3">

                    <div class="row" id="row-4">

                        <div class="seat" data-pc="21"></div>
                        <div class="space"></div>
                        <div class="seat" data-pc="22"></div>
                        <div class="seat" data-pc="23"></div>
                        <div class="seat" data-pc="24"></div>
                    </div>

                    <div class="row" id="row-5">
                        <div class="seat" data-pc="25"></div>
                        <div class="seat" data-pc="26"></div>
                        <div class="seat" data-pc="27"></div>
                        <div class="space"></div>
                        <div class="seat" data-pc="28"></div>
                        <div class="seat" data-pc="29"></div>
                        <div class="cis"></div>
                    </div>
                    <div id="submit-container">
                        <button onclick="openModal()" class="submit-btn">Submit</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="confirm-modal-container" class="hidden">
        <div id="confirm-modal-area">
            <h2>Confimation</h2>
            <p id="modal-details">
                Date: <br>
                Time: <br>
                Building: <br>
                Room: <br>
                Number of seats: <br>
            </p>
            <div class="dialog-buttons">
                <button class="confirm-btn" onclick="returnDashboard()" onclick="returnDashboard()">Confirm</button>
                <button onclick="closeModal()" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>
    <script>
        let bldgname = localStorage.getItem("bldg-name");
        let bldg_text = document.querySelector(".reserve-bldg-text");
        if (bldgname && bldg_text) {
            bldg_text.innerHTML = bldgname;
        }
        let go_back = document.querySelector("#go-back-container .go-back-text");
        go_back.onclick = function () {
            window.location.href = "DLSU-buildings.html";
        };

        let room_container = document.querySelectorAll(".room-container");

        room_container.forEach((container) => {
            container.onclick = function () {
                let roomname = container.querySelector("div").innerText;
                localStorage.setItem("room-name", roomname);
                window.location.href = "reserve-seat.html";
            };
        });

        let container = document.getElementById("slots-container");

        container.addEventListener("click", (e) => {
            if (e.target.classList.contains('seat')) {
                console.log("Seat clicked:", e.target.dataset.pc);
                e.target.classList.toggle("selected");
            };

        });

        const modal = document.getElementById('confirm-modal-container');

        function openModal() {
            console.log('open')
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }

        function returnDashboard(){
            window.location.href = 'dashboard.html';
        }
    </script>
    <script type="application/javascript" src="../../backend/main.js"></script>
    <script type="application/javascript" src="../../backend/sidebar.js"></script>
</body>

</html>
